<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Shed Upgrade &mdash; Triangular-Roof Carport / Storage</title>
    <link rel="stylesheet" href="css/styles.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <div id="app">
      <header id="titlebar">
        <div class="title">
          <h1>Shed Upgrade &mdash; Triangular-Roof Storage + Carport</h1>
          <div class="meta">
            <span id="meta-project">Project: SHED-UPG-01</span>
            <span id="meta-scale">Scale: 1:50 @ A3</span>
            <span id="meta-code">Eurocode / Estonian Ehitusseadustik</span>
            <span id="meta-rev">Rev A &mdash; <span id="meta-date"></span></span>
          </div>
        </div>
      </header>

      <main id="viewport">
        <canvas id="canvas3d"></canvas>

        <aside id="panel-left">
          <section class="panel">
            <h2>View</h2>
            <div class="btn-row">
              <button data-view="iso">Iso</button>
              <button data-view="front">Front</button>
              <button data-view="back">Back</button>
              <button data-view="left">Left</button>
              <button data-view="right">Right</button>
              <button data-view="top">Top (plan)</button>
            </div>
            <h2>Mode</h2>
            <div class="btn-row vertical">
              <label><input type="checkbox" data-layer="cladding" checked /> Cladding &amp; roof skin</label>
              <label><input type="checkbox" data-layer="structure" checked /> Structural frame</label>
              <label><input type="checkbox" data-layer="foundation" checked /> Foundation</label>
              <label><input type="checkbox" data-layer="dimensions" /> Dimension lines</label>
              <label><input type="checkbox" data-layer="grid" checked /> Ground &amp; grid</label>
              <label><input type="checkbox" data-layer="context" checked /> Site context</label>
              <label><input type="checkbox" data-layer="wireframe" /> Wireframe overlay</label>
              <label><input type="checkbox" data-layer="exploded" /> Exploded view</label>
            </div>
          </section>

          <section class="panel">
            <h2>Legend</h2>
            <ul class="legend" id="legend-list"></ul>
          </section>
        </aside>

        <aside id="panel-right">
          <section class="panel" id="panel-specs">
            <h2>Specification</h2>
            <div id="specs-content"></div>
          </section>
        </aside>

        <div id="hud-bottom">
          <div id="hud-dims"></div>
          <div id="hud-hint">Drag = orbit &middot; Right-drag = pan &middot; Wheel = zoom</div>
        </div>
      </main>
    </div>

    <script type="module" src="js/main.js"></script>
  </body>
</html>
